apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagrams
  namespace: diagrams
  labels:
    app: diagrams
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagrams
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: diagrams
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: infra-shared
      containers:
        - name: diagrams
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: KEY_VAULT_URL
              value: https://ng6-diagrams.vault.azure.net/
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
